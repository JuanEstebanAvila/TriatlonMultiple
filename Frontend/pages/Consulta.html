</head>
<body>

<div class="card shadow-sm border-0 mb-4">
  <div class="card-header bg-institucional text-white fw bold">
    Panel de consultas y Filtros
  </div>
  <div class="card-body">
    <!-- formulario -->
    <form id="form-consulta" class="row g-3 align-items-end">
      <!-- espacio donde llena el id -->
      <div class="col-3">
        <!-- Consulta por id -->
        <label for="buscar-id" class="form-label fw-bold">Buscar por Identificacion ID </label>
        <div class="input-group">
          <input type="text" class ="form-control" id="buscar-id" placeholder="Id a buscar">
          <button class="btn btn-outline-primary" type="button" id="btn-buscar-id">
            <i class="bi bi-search"></i>
          </button>
        </div>
      </div>
      <!-- Consulta por genero -->
      <div class="col-2">
        <label for="filtroGenero" class="form-label small fw-bold">Genero</label>
        <select class="form-select" id="filtro-genero">
          <option value="">seleccione</option>
          <option value="M"> Masculino</option>
          <option value="F"> Femenino</option>
        </select>
      </div>
      <!-- Consulta por categoria -->
      <div class="col-3">
        <label for="filtro-categoria" class="form-label small fw-bold">Categoria</label>
        <select class="form-select" id="filtro-categoria">
          <option value="">Todas</option>
          <option value="pre benjamin">PreBenjamin</option>
          <option value="benjamin"> benjamin</option>
          <option value="alevin"> Alevin</option>
          <option value="infantil"> Infantil</option>
          <option value="cadetes"> Cadetes</option>
          <option value="juvenil"> Juvenil</option>
          <option value="junior"> Junior </option>
          <option value="sub-23"> Sub-23</option>
          <option value="absoluta">Absoluta</option>
          <option value="veteranos">Veteranos(1,2 y 3)</option>
        </select>
      </div>
      <!-- Consulta por especialidad -->
      <div class="col-2">
        <label for="filtro-especialidad" class="form-label small fw-bold">Especialidad </label>
        <select class="form-select" id="filtro-especialidad">
          <option value="">Todas</option>
          <option value="Super Sprint">Super Sprint</option>
          <option value="Sprint">Sprint</option>
          <option value="Olimpica">Olimpica</option>
          <option value="Media Distancia">Media Distancia</option>
          <option value="Larga Distancia">Larga Distancia</option>
          <option value="Ultraman">Ultraman</option>
        </select>
      </div>
      <!-- Consulta por Cross -->
      <div class="col-2">
        <label class="form-label small fw-bold">Modalidad Cross</label>
        <select class="form-select" id="filtro-cross">
          <option value="">Todos</option>
          <option value="true">Con Cross</option>
          <option value="false">Sin Cross</option>
        </select>
      </div>
      <div class="col-2  text-end">
        <button type="button" class="btn btn-secondary w-100" id="btn-limpiar-filtros"> Ver todos </button>
      </div>
    </form>
  </div>
  <!-- Tabla de resultados de las busqueda -->
  <div class="container mt-4">
    <div id="vista-consulta" class="card shadow-sm border-0">
      <div class="table-responsive rounded">
        <table class="table table-hover align-middle mb-0">
          <thead class="bg-institucional text-white">
          <tr>
            <th>Identificación</th>
            <th>Nombre</th>
            <th>Edad</th>
            <th>Genero</th>
            <th>Categoria</th>
            <th>Especialidad</th>
            <th>Cross</th>
          </tr>
          </thead>
          <tbody id="tabla-consulta-body">
          </tbody>
        </table>
      </div>
    </div>
    <div id="mensaje-sin-resultados" class="alert alert-warning mt-3 d-none">
      No se encontraron atletas con esos filtros.
    </div>
  </div>
</div>
<!-- Importa el archivo de JavaScript de Bootstrap. Esto es necesario para dar vida a componentes interactivos
como barras de navegación colapsables, menus desplegables y ventanas modales de alerta -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/main.js"></script>
</body>
</html>
