</head>

<!-- card de registro con imagen -->
<div class="card shadow-sm border-0">
  <img src="../img/registrp.png" class="card-img-top" alt="...">
  <div class="card-header bg-institucional text-white fw-bold">
    Registro de Nuevo Atleta
  </div>

  <div class="card-body">
    <p class="card-text">Aqui podra realizar su registro como atleta a participar en el triathlon</p>
  </div>
  <div class="card-body">
    <!-- el id permite atrapar el envio  -->
    <form id="form-registro" class="row g-3">
      <div class="col-6">
        <!-- nombre. el for debe coincidir con el input para que se vea mejor -->
        <label for="nombre" class="form-label fw-bold-"> Nombre Completo</label>
        <input type="text" class="form-control" id="nombre" required>

        <!-- id -->
        <label for="identificacion" class="form-label fw-bold mt-3-"> Identificacion(ID)</label>
        <input type="text" class="form-control" id="identificacion" required>

        <div class="row mt-3">
          <!-- edad -->
          <div class="col-6">
            <label for="edad" class="form-label fw-bold"> Edad </label>
            <input type="number" class="form-control" id="edad" required min="7" max="99">
            <div id="categoria-calculada" class="badge bg-warning text-dark mt-1 d-none"></div>
          </div>
          <!-- genero lista de seleccion-->
          <div class="col-6">
            <label for="genero" class="form-label fw-bold "> Genero </label>
            <select class="form-select" id="genero" required>
              <option value="">seleccione</option>
              <option value="masculino"> Masculino</option>
              <option value="femenino"> Femenino</option>
            </select>
          </div>
        </div>
      </div>
      <!-- correo del atleta (necesario para el envío de correo de registro) -->
      <div class="col-6">
        <label for="correo" class="form-label fw-bold"> Correo electrónico </label>
        <input type="email" class="form-control" id="correo" placeholder="atleta@correo.com" required>
      </div>

      <!-- seleccion de foto -->
      <div class="col-6">
        <label for="foto" class="form-label fw-bold"> Foto del atleta (URL) </label>
        <input type="url" class="form-control" id="foto" placeholder="https://..." required>
      </div>

      <!-- preferencias de competencia -->

      <div id="swiping-section" class="mt-4 p-3 border rounded bg-light">
        <h4 class="fw-bold border-bottom pb-2">Preferencias de Competencia</h4>

        <div class="col-12 mt-4">
          <label class="form-label fw-bold d-block text-center mb-3">
            Seleccione su Especialidad (use las flechas para navegar)
          </label>
          <input type="hidden" name="especialidad" id="input-especialidad" required>

          <div id="esp-card-registro" class="card text-center p-4 mx-auto shadow-sm" style="max-width:400px; min-height:200px; border-radius:12px;"></div>

          <div class="d-flex align-items-center justify-content-between mt-3 mx-auto" style="max-width:400px;">
            <button type="button" class="btn btn-outline-secondary" id="btn-esp-prev">
              <i class="bi bi-arrow-left"></i>
            </button>
            <div class="d-flex gap-2" id="esp-dots"></div>
            <button type="button" class="btn btn-outline-secondary" id="btn-esp-next">
              <i class="bi bi-arrow-right"></i>
            </button>
          </div>

          <div id="especialidad-seleccionada" class="alert alert-warning mt-3 py-2 d-none text-center mx-auto" style="max-width:400px;">
            <i class="bi bi-check-circle"></i> Especialidad elegida: <strong id="texto-especialidad"></strong>
          </div>
        </div>

        <div class="form-check form-switch mt-4">
          <input class="form-check-input" type="checkbox" id="esCross">
          <label class="form-check-label fw-bold" for="esCross">
            ¿Desea participar en modalidad cross?
          </label>
        </div>
      </div>

      <!-- guardar formulario o reiniciar -->
      <div class="col-12 text-end mt-4">
        <button type="reset" class="btn btn-secondary"> limpiar</button>
        <button type="submit" class="btn btn-warning px-5 fw-bold"> Guardar atleta</button>
      </div>
    </form>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/main.js"></script>
</body>
</html>
